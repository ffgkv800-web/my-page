<html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة الى هدوش</title>
    <style>
        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background-color: #ffe4e1;
            font-family: 'Arial', sans-serif; overflow: hidden; text-align: center;
        }
        .container {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; max-width: 400px;
        }
        h1 { color: #ff4d6d; margin-bottom: 30px; font-size: 22px; line-height: 1.5; }
        .buttons { 
            display: flex; justify-content: center; gap: 20px; 
            position: relative; height: 60px; align-items: center;
        }
        button {
            padding: 12px 25px; font-size: 18px; border: none;
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        #yesBtn { background-color: #ff4d6d; color: white; position: relative; z-index: 10; }
        #noBtn {
            background-color: #888; color: white;
            position: absolute; left: 60%; transition: 0.2s ease;
        }
        .success-msg { display: none; color: #ff4d6d; font-size: 20px; margin-top: 20px; animation: fadeIn 1s; }
        
        /* تنسيق رابط الأغنية */
        .song-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #ff4d6d;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
            transition: 0.3s;
        }
        .song-link:hover { transform: scale(1.05); background-color: #e63958; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container" id="mainCard">
        <h1 id="question">بتهون  <br>صح انتي كسرتيني  </h1>
        
        <div class="buttons">
            <button id="yesBtn" onclick="showLove()">نعم</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">لا</button>
        </div>

        <div id="message" class="success-msg">
         اسمعي <br>
            اضغطي هنا لسماع الأغنية: <br>
            <a href="https://www.instagram.com/reel/DWhpyaTiCHT/?utm_source=ig_web_copy_link&igsh=NTc4MTIwNjQ2YQ==" target="_blank" class="song-link">🎵 تشغيل الأغنية الآن</a>
        </div>
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function showLove() {
            document.getElementById('question').style.display = 'none';
            document.querySelectorAll('button').forEach(b => b.style.display = 'none');
            document.getElementById('message').style.display = 'block';
            document.body.style.backgroundColor = '#ffccd5';
        }
    </script>
</body>
</html>
