<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أغلى إنسانة</title>
    <style>
        body {
            background-color: #ffeef2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            position: relative;
            z-index: 10;
        }
        .kitty-batman {
            width: 150px;
            margin-bottom: 15px;
        }
        h2 { color: #d63384; margin-bottom: 20px; }
        .btn {
            padding: 10px 25px;
            margin: 10px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }
        .btn-yes { background-color: #ff4d6d; color: white; }
        .btn-no { background-color: #6c757d; color: white; }
        .result-link {
            display: none;
            margin-top: 20px;
            color: #d63384;
            font-weight: bold;
            text-decoration: none;
            word-break: break-all;
        }
        .next-btn {
            display: none;
            margin-top: 15px;
            background: #4caf50;
            color: white;
        }
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            animation: float 3s linear infinite;
            z-index: 1;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        #final-screen { display: none; }
    </style>
</head>
<body>

    <!-- قلوب متحركة في الخلفية -->
    <script>
        for (let i = 0; i < 20; i++) {
            let heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            heart.style.delay = Math.random() * 5 + 's';
            document.body.appendChild(heart);
        }
    </script>

        <div id="question-area">
            <h2 id="question-text">هل تحبيني؟</h2>
            <button class="btn btn-yes" onclick="showResult('yes')">نعم</button>
            <button class="btn btn-no" onclick="showResult('no')">لا</button>
        </div>

        <div id="result-area">
            <p id="response-text"></p>
            <a id="video-link" class="result-link" target="_blank">اضغطي هنا لمشاهدة المقطع 🎬</a>
            <br>
            <button class="btn next-btn" id="next-btn" onclick="nextQuestion()">السؤال التالي ⬅️</button>
        </div>

        <div id="final-screen">
            <img src="https://pinimg.com" class="kitty-batman">
            <h2>عزوز يحبك مهما عملتي ❤️</h2>
        </div>
    </div>

    <script>
        let currentStep = 1;

        const content = {
            1: {
                q: "هل تحبيني؟",
                yes: { text: "عارف والله! شوف هالمقطع:", link: "https://www.instagram.com/reel/DWcYumlArvT/" },
                no: { text: "حتى لو لا، شوفي:", link: "https://www.instagram.com/reel/DWKn9SSIIY0/" }
            },
            2: {
                q: "هل ندمانة على فراقي؟",
                yes: { text: "كنت عارف..", link: "https://www.instagram.com/reel/DWkO0qSooQx/" },
                no: { text: "ما توقعتها.. بس شوفي:", link: "https://www.instagram.com/reel/DWkDOSMojSq/" }
            },
            3: {
                q: "لو رجع فيكي الزمن تضيعيني من بين اديكي؟",
                yes: { text: "لا لا متوقعتها منك 💔", link: "https://www.instagram.com/reel/DVwzA9YCMtu/?utm_source=ig_web_copy_link&igsh=NTc4MTIwNjQ2YQ==" },
                no: { text: "بحبكككككككك ❤️", link: "https://youtu.be/L1JvzZgT25M?si=hKU8mtPkHNPpYg6w" }
            }
        };

        function showResult(answer) {
            const stepData = content[currentStep];
            const resultArea = document.getElementById('result-area');
            const questionArea = document.getElementById('question-area');
            const videoLink = document.getElementById('video-link');
            const responseText = document.getElementById('response-text');

            questionArea.style.display = 'none';
            resultArea.style.display = 'block';

            responseText.innerText = stepData[answer].text;
            
            if (stepData[answer].link !== "") {
                videoLink.href = stepData[answer].link;
                videoLink.style.display = 'inline-block';
            } else {
                videoLink.style.display = 'none';
            }

            document.getElementById('next-btn').style.display = 'inline-block';
        }

        function nextQuestion() {
            currentStep++;
            if (currentStep <= 3) {
                document.getElementById('question-text').innerText = content[currentStep].q;
                document.getElementById('question-area').style.display = 'block';
                document.getElementById('result-area').style.display = 'none';
                document.getElementById('next-btn').style.display = 'none';
            } else {
                document.getElementById('question-area').style.display = 'none';
                document.getElementById('result-area').style.display = 'none';
                document.getElementById('final-screen').style.display = 'block';
            }
        }
    </script>
