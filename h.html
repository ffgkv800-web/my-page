<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية ووداع من معتز</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            margin: 0;
            color: #fff;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .gift-box {
            font-size: 70px;
            cursor: pointer;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }
        .message-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 20px 0;
            color: #ecf0f1;
        }
        audio {
            width: 100%;
            margin: 20px 0;
            filter: invert(1); /* لجعل شكل المشغل يتناسب مع الخلفية المظلمة */
        }
        .btn-action {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-action:hover { background: #c0392b; }
        .hidden { display: none; }
        .counter { font-size: 0.9rem; color: #bdc3c7; margin-bottom: 10px; }
    </style>
</head>
<body>

<!-- شاشة الهدية والرسالة -->
<div id="startScreen" class="card">
    <div class="gift-box" onclick="showPlayer()">🎁</div>
    <h1>هدية من معتز</h1>
    <div class="message-text">
        "انتبهي لحالك.. وراح يجي يوم تحكي وين الي كان يحبني وما ريده، وين الي كان أحن أخ وصديق.. وما بدي أحكي حبيب لانو حبي انتهى حب من طرف واحد."
    </div>
    <p style="font-size: 0.9rem; color: #bdc3c7;">(اضغطي على الهدية للبدء)</p>
</div>

<!-- شاشة المشغل -->
<div id="playerScreen" class="card hidden">
    <div class="counter" id="counter">المقطع 1 من 5</div>
    <h3 style="margin-top: 0;">للوداع..</h3>
    
    <audio id="mainAudio" controls>
        <source id="audioSource" src="1.mp3" type="audio/mpeg">
    </audio>

    <p>خلصتي من المقطع؟</p>
    <button class="btn-action" onclick="nextTrack()">نعم</button>
</div>

<!-- شاشة النهاية -->
<div id="endScreen" class="card hidden">
    <h2>انتهت المقاطع..</h2>
    <p>كل التوفيق لكِ في طريقك.</p>
    <div style="font-size: 40px;">🥀</div>
</div>

<script>
    const playlist = ["1.mp3", "2.mp3", "3.mp3", "4.mp3", "5.mp3"];
    let currentIdx = 0;

    const audio = document.getElementById('mainAudio');
    const source = document.getElementById('audioSource');
    const counter = document.getElementById('counter');

    function showPlayer() {
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('playerScreen').classList.remove('hidden');
        audio.play();
    }

    function nextTrack() {
        currentIdx++;
        if (currentIdx < playlist.length) {
            counter.innerText = `المقطع ${currentIdx + 1} من ${playlist.length}`;
            source.src = playlist[currentIdx];
            audio.load();
            audio.play();
        } else {
            document.getElementById('playerScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.remove('hidden');
        }
    }
</script>

</body>
</html>
